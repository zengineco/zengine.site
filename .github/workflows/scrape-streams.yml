#
# Runs scrapeStreams.js every 6 hours.
# Generates MGN· codes for every stream (DAG-OR v3.0).
# Writes to Supabase (mgn_observation_registry, streams, mgn_entity_registry).
# Commits updated data/streams.json back to repo (frontend JSON fallback).
#
# REQUIRED REPO SECRETS (Settings → Secrets and variables → Actions):
#   SUPABASE_URL              — https://[your-project-ref].supabase.co
#   SUPABASE_SERVICE_ROLE_KEY — service_role key (NEVER the anon key here)
#
# PERMISSIONS REQUIRED:
#   Repo Settings → Actions → General → Workflow permissions
#   → Read and write permissions (for git push step)
# =============================================================

name: Refresh Live Streams + MGN Registry

on:
  schedule:
    # Every 6 hours: midnight, 6am, noon, 6pm UTC
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug output"
        required: false
        default: "false"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm install --save-dev node-fetch@2 cheerio abort-controller
          echo "Dependencies installed"

      - name: Run stream scraper + MGN codegen
        run: node scripts/scrapeStreams.js
        env:
          NODE_ENV:                   production
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # DECISION: service_role key is passed ONLY as a GitHub secret.
          # It is never written to any file, never logged, never committed.
          # Frontend uses SUPABASE_ANON_KEY which is safe to expose in client JS.

      - name: Verify output
        run: |
          if [ -f "data/streams.json" ]; then
            COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/streams.json','utf8')).length)")
            echo "streams.json updated — $COUNT streams with MGN codes"
            # Show first MGN code as sanity check
            node -e "var s=JSON.parse(require('fs').readFileSync('data/streams.json','utf8')); console.log('Sample MGN:', s[0] && s[0].mgn_code || 'none')"
          else
            echo "ERROR: streams.json not found"
            exit 1
          fi

      - name: Commit JSON fallback to repo
        run: |
          git config --global user.name  "zengine-cam-bot"
          git config --global user.email "bot@zengine.site"
          git add data/streams.json
          git diff --staged --quiet && echo "No changes — skipping commit" || \
            git commit -m "🎥 refresh streams + MGN registry [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
